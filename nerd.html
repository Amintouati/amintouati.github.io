body {

.sidenav {
    height: 100%;
    width: 25%;
    font-size: 100%;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: rgb(255, 255, 255);
    overflow-x: hidden;
    padding-top: 4.5%;
    font-family: 'Inconsolata', monospace;
}

.sidenav a {
    padding: 6px 6px 6px 32px;
    text-decoration: none;
    font-size: 170%;
    color: #000000;
    display: block;
    padding-left: 28%;
}

.sidenav a:hover {
    color: #9b9b9b;
}

.sidenav h2 {
    padding: 24px 6px 24px 32px;
    font-size: 170%;
    color: #000000;
    display: inline-block;
    padding-left: 28%;
    padding-right: 28%;

.text{
    height: 10%;
    top: 0;
    left: 0;    
    background-color: rgba(255, 255, 255, 0);
    font-family: 'Inconsolata', monospace;
}

.text p {
    padding: 24px 6px 24px 32px;
    font-size: 150%;
    color: #000000;
}

.main {
    margin-left: 24%; /* Same as the width of the sidenav */
    padding-left: 5%;
    padding: auto;
    width: 50%;
}

@media screen and (max-height: 40px) {
    .sidenav {padding-top: 15px;}
    .sidenav a {font-size: 25px;}
}
