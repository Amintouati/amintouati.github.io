<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="../favicon.jpg" rel="icon">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@500&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Source Code Pro', monospace;
}

.nav {
    width: 100%;
    position: -webkit-sticky; /* Safari */
    position: sticky;                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           
    z-index: 1;
    top: 0;
    left: 0;
    background-color: rgb(255, 255, 255);
    overflow-x: hidden;
    text-align: center ;
    word-spacing: 10px;
}

.sidenav {
  display: none;
}

.sidenav a {
  display: none;
}

.sidenav a:hover {
  display: none;
}

.titre {
    text-align: center ;
    word-spacing: 0px ;
}

.text {
    text-align: center ;
    max-width: 100%;
}

a:link {
  text-decoration: none;
}

a:visited {
  text-decoration: none;
  color:rgb(12, 12, 12)
}

a:hover {
  color:rgb(130, 130, 130)
}


* {
  box-sizing: border-box;
}

/* Create two unequal columns that floats next to each other */
.column {
  float: left;
  padding: 10px;
}

.column img {
    margin-top: 8px;
    vertical-align: middle;
    width: 100%;
    opacity: 0.6;
}

.column img:hover {
    opacity: 1;
}


.left {
  width: 50%;
}

.right {
  width: 50%;
}

/* Clear floats after the columns */
.row :after {
  max-width: 100%;
  content: "";
  display: table;
  clear: both;
  padding-bottom: 40px;
}

.TEST {
  width: 100%;
}

.rangee {
  display: none;
}

.column3 {
  display: none;
}

/* Clear floats after the columns */
.row3:after {
  display: none;
}

.column3 img {
  display: none;
}



@media only screen and (min-width: 1000px) {

.nav {
  display: none;
}

.sidenav {
  display:block;
  height: 100%;
  width: 200px;
  position: fixed;
  z-index: 1;
  top: 0;
  left: 0;
  background-color: rgb(255, 255, 255);
  overflow-x: hidden;
  text-align: left ;
  padding-top: 20px;
}

.sidenav a {
  display:block;
  padding: 6px 6px 6px 32px;
  text-decoration: left;
  font-size: 20px;
  color: #818181;
  display: block;
}

.sidenav a:hover {
  display:block;
  color: rgb(130, 130, 130)
}

.titre {
  display:block;
  text-decoration: left;
  font-size: 20px;
  color: #000000;
  display: block;
}

.text {
    text-align:left ;
    max-width: 100%;
}

a:link {
  text-decoration: left;
}

a:visited {
  text-decoration: left;
  color:rgb(12, 12, 12)
}


.main {
  margin-left: 200px; /* Same as the width of the sidenav */
}

.br {
  display: block;
}

/* Create two unequal columns that floats next to each other */
.column {
  display: none;

}



.left {
  display: none;
}

.right {
  display: none;
}

/* Clear floats after the columns */
.row:after {
  display: none;

}

/* trois colonnes */
.colonne {
  float: left;
  width: 33.33%;
  padding: 10px;
}

/* Clear floats after the columns */
.rangee:after {
  content: "";
  display: table;
  clear: both;
}

.sidenav img{
  max-width: 100%;
}

.column3 {
  float: left;
  width: 33.33%;
  padding: 10px;
  max-width: 100%;
  display: block;
}



/* Clear floats after the columns */
.row3:after {
  content: "";
  display: table;
  clear: both;
  display: block;

}

.column3 img {
    margin-top: 8px;
    vertical-align: middle;
    width: 100%;
    display: block;
    opacity: 0.6;
}

.column3 img:hover {
    opacity: 1;
}


.maintenance {
  max-width: 10%;
}

}

</style>
</head>
