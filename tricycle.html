<style>

@font-face {
font-family: "CustomFont";
src: url(Inconsolata.ttf);
}

body {
    padding-top: 200px;
    font-family: "Lato", sans-serif;
    background-color: #ffffff;
}

.sidenav {
    height: 100%;
    width: 25%;
    font-size: 100%;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: rgb(255, 255, 255);
    overflow-x: hidden;
    padding-top: 4.5%;
    font-family: 'Inconsolata', monospace;
}

.sidenav a {
    padding: 6px 6px 6px 32px;
    text-decoration: none;
    font-size: 170%;
    color: #000000;
    display: block;
    padding-left: 28%;
}

.sidenav a:hover {
    color: #9b9b9b;
}

.sidenav h2 {
    padding: 24px 6px 24px 32px;
    font-size: 170%;
    color: #000000;
    display: inline-block;
    padding-left: 28%;
    padding-right: 28%;
    
}

.text{
    height: 10%;
    top: 0;
    left: 0;    
    background-color: rgba(255, 255, 255, 0);
    font-family: 'Inconsolata', monospace;
}

.text p {
    padding: 24px 6px 24px 32px;
    font-size: 150%;
    color: #000000;
}

.main {
    margin-left: 24%; /* Same as the width of the sidenav */
    padding-left: 5%;
    padding: auto;
    width: 50%;
}

@media screen and (max-height: 40px) {
    .sidenav {padding-top: 15px;}
    .sidenav a {font-size: 25px;}
}

.dow {
  display: flex;
  padding: 0 4px;
}

/* Create four equal columns that sits next to each other */
.dolumn {
  max-width: 20%;
  padding: 0 4px;
}

.dolumn p{
  font-size: 100%;
  font-weight: bold;
  font-family: 'Inconsolata', monospace;
  text-align: center;
}

.dolumn img {
  margin-top: 8px;
  vertical-align: middle;
  width: 100%;
  border-radius: 5px;
  transition: 0.3s linear;
  flex-basis: 75%;
}

@media screen and (max-width: 800px) {
  .dolumn {
    flex: 50%;
    max-width: 50%;
  }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
  .dolumn {
    flex: 100%;
    max-width: 100%;
  }
}
    
</style>
