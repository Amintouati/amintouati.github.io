<style>
body {
    padding-top: 200px;
    font-family: "Lato", sans-serif;
}

.sidenav {
    height: 100%;
    width: 25%;
    position: fixed;
    z-index: 1;
    top: 0;
    left: 0;
    background-color: rgb(255, 255, 255);
    overflow-x: hidden;
    padding-top: 4.5%;
    font-family: 'Inconsolata', monospace;
}

.sidenav a {
    padding: 6px 6px 6px 32px;
    text-decoration: none;
    font-size: 150%;
    color: #000000;
    display: block;
    padding-left: 28%;
}

.sidenav a:hover {
    color: #9b9b9b;
}

.sidenav h2 {
    padding: 24px 6px 24px 32px;
    font-size: 150%;
    color: #000000;
    display: inline-block;
    padding-left: 28%;
    padding-right: 28%;
    
}

.text{
    margin-left: 25%;
    height: 100%;
    width: 25%;
    position: fixed;
    background-color: rgb(255, 255, 255);
    font-family: 'Inconsolata', monospace;
}

.text p {
    padding: 24px 6px 24px 32px;
    font-size: 150%;
    color: #000000;
    display: inline-block;
    padding-top: 50%;
}

.main {
    margin-left: 50%; /* Same as the width of the sidenav */
}


@media screen and (max-height: 450px) {
    .sidenav {padding-top: 15px;}
    .sidenav a {font-size: 25px;}
}

.container-fluid{
    padding-left: 25%;
}

.row {
  display: flex;
  flex-wrap: wrap;
  padding: 0 4px;
}

/* Create four equal columns that sits next to each other */
.column {
  flex: 25%;
  max-width: 33.3%;
  padding: 0 4px;
}

.column img {
  margin-top: 8px;
  vertical-align: middle;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s linear;
  opacity: 0.7;
}

.column img:hover {
    opacity: 1;
}

@media screen and (max-width: 800px) {
  .column {
    flex: 50%;
    max-width: 50%;
  }
}

/* Responsive layout - makes the two columns stack on top of each other instead of next to each other */
@media screen and (max-width: 600px) {
  .column {
    flex: 100%;
    max-width: 100%;
  }
}
